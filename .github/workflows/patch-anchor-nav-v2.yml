name: Patch anchor navigation v2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch hero stacking and calibrated anchor scrolling
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('src/pages/index.astro')
          text = path.read_text(encoding='utf-8')
          original = text

          # Kill unreliable native hash offsets; JS below calculates the exact landing point.
          text = text.replace('html{scroll-behavior:smooth;scroll-padding-top:118px}', 'html{scroll-behavior:smooth;scroll-padding-top:0}')
          text = re.sub(r'section\[id\],article\[id\]\{scroll-margin-top:\d+px\}', 'section[id],article[id]{scroll-margin-top:0}', text)

          # Desktop left visual: make the profile and terminal flow vertically, never overlap.
          text = text.replace(
            '.hero-grid{display:grid;grid-template-columns:minmax(360px,.76fr) minmax(0,1.24fr);gap:clamp(56px,7vw,96px);align-items:center}.hero-visual{display:grid;align-content:center;gap:20px;min-height:650px;contain:layout paint}',
            '.hero-grid{display:grid;grid-template-columns:minmax(360px,.76fr) minmax(0,1.24fr);gap:clamp(56px,7vw,96px);align-items:center}.hero-visual{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:18px;min-height:650px;contain:layout paint}'
          )
          text = text.replace('width:min(356px,calc(100% - 32px));padding:14px;', 'width:min(356px,100%);padding:14px;')
          text = text.replace('width:calc(100% - 42px);max-width:390px;margin-left:42px;', 'width:min(390px,calc(100% - 24px));max-width:390px;margin-left:24px;')
          text = text.replace('.profile-card,.terminal-card{width:100%;max-width:none;margin-left:0;transform:none}', '.profile-card,.terminal-card{width:100%;max-width:none;margin-left:0;transform:none}')

          # Replace the bottom script with a deterministic anchor system.
          new_script = r'''<script>
      const progress = document.querySelector('.progress');
      const topbar = document.querySelector('.topbar');
      const navLinks = [...document.querySelectorAll('.nav a')];

      const getOffset = () => Math.ceil((topbar?.getBoundingClientRect().height || 70) + 24);
      const getAnchorNode = (hash) => {
        if (!hash || hash === '#') return null;
        if (hash === '#top') return document.getElementById('top') || document.body;
        const root = document.querySelector(hash);
        if (!root) return null;
        return root.matches('section[id]') ? (root.querySelector('.section-head') || root) : root;
      };
      const getTargetY = (node, hash) => {
        if (!node || hash === '#top') return 0;
        return Math.max(0, node.getBoundingClientRect().top + window.scrollY - getOffset());
      };
      const scrollToHash = (hash, updateUrl = true) => {
        const node = getAnchorNode(hash);
        if (!node) return;
        const y = getTargetY(node, hash);
        window.scrollTo({ top: y, behavior: 'smooth' });
        if (updateUrl) history.replaceState(null, '', hash);
        window.setTimeout(() => {
          const corrected = getTargetY(node, hash);
          if (Math.abs(window.scrollY - corrected) > 6) {
            window.scrollTo({ top: corrected, behavior: 'auto' });
          }
        }, 520);
      };

      document.querySelectorAll('a[href^="#"]').forEach((link) => {
        link.addEventListener('click', (event) => {
          const hash = link.getAttribute('href');
          const node = getAnchorNode(hash);
          if (!node) return;
          event.preventDefault();
          scrollToHash(hash, true);
        });
      });

      const sectionMap = navLinks
        .map((link) => {
          const hash = link.getAttribute('href');
          const root = hash && hash !== '#top' ? document.querySelector(hash) : null;
          const marker = root?.querySelector?.('.section-head') || root;
          return marker ? [link, marker] : null;
        })
        .filter(Boolean);

      let raf = 0;
      const tick = () => {
        const top = window.scrollY || document.documentElement.scrollTop;
        const max = document.documentElement.scrollHeight - window.innerHeight;
        if (progress) progress.style.transform = `scaleX(${max > 0 ? Math.min(top / max, 1) : 0})`;
        let current = sectionMap[0]?.[0];
        const probe = top + getOffset() + 8;
        sectionMap.forEach(([link, marker]) => {
          const markerTop = marker.getBoundingClientRect().top + window.scrollY;
          if (probe >= markerTop) current = link;
        });
        navLinks.forEach((link) => link.classList.toggle('is-active', link === current));
        raf = 0;
      };
      const onScroll = () => {
        if (!raf) raf = requestAnimationFrame(tick);
      };
      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', onScroll, { passive: true });
      tick();

      if (window.location.hash) {
        window.setTimeout(() => scrollToHash(window.location.hash, false), 120);
      }

      if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        const obs = new IntersectionObserver((entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              e.target.classList.add('is-visible');
              obs.unobserve(e.target);
            }
          });
        }, { threshold: .12, rootMargin: '0px 0px -6% 0px' });
        document.querySelectorAll('.reveal').forEach((el) => obs.observe(el));
      } else {
        document.querySelectorAll('.reveal').forEach((el) => el.classList.add('is-visible'));
      }
    </script>'''
          text = re.sub(r'<script>[\s\S]*?</script>\s*</body>', new_script + '\n  </body>', text, count=1)

          if text != original:
            path.write_text(text, encoding='utf-8')
            print('Patched anchor navigation v2 and non-overlap hero layout')
          else:
            print('No patch needed')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/pages/index.astro
            git commit -m "fix: calibrate titlebar anchor navigation"
            git push
          fi
