name: Load lower section polish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Insert lower section polish assets
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('src/pages/index.astro')
          s = p.read_text(encoding='utf-8')
          if '/lower-section-polish.css' not in s:
              s = s.replace('</head>', '    <link rel="stylesheet" href="/lower-section-polish.css" />\n  </head>')
          if '/lower-section-polish.js' not in s:
              s = s.replace('</body>', '    <script src="/lower-section-polish.js" defer></script>\n  </body>')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/pages/index.astro
            git commit -m "feat: load final section polish effects"
            git push
          fi
